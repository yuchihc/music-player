<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .player-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .current-song {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }
        
        .current-song h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .current-song p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .controls button {
            background: #667eea;
            border: none;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .controls button:hover {
            transform: scale(1.1);
            background: #764ba2;
        }
        
        .controls button:active {
            transform: scale(0.95);
        }
        
        .controls .play-pause {
            width: 80px;
            height: 80px;
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .progress-container {
            margin-bottom: 30px;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s;
        }
        
        .playlist {
            max-height: 300px;
            overflow-y: auto;
            border-top: 2px solid #e0e0e0;
            padding-top: 20px;
        }
        
        .playlist-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .playlist-item:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }
        
        .playlist-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }
        
        .playlist-item-number {
            font-size: 18px;
            font-weight: bold;
            min-width: 30px;
        }
        
        .playlist-item.active .playlist-item-number {
            color: #fff;
        }
        
        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .volume-icon {
            font-size: 24px;
        }
        
        .volume-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #e0e0e0;
            border-radius: 10px;
            outline: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .volume-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        /* 捲軸美化 */
        .playlist::-webkit-scrollbar {
            width: 8px;
        }
        
        .playlist::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .playlist::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        .playlist::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .player-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .current-song h2 {
                font-size: 20px;
            }
            
            .controls button {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .controls .play-pause {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎵 世界名曲</h1>
        
        <div class="current-song">
            <h2 id="currentSongTitle">曲目 1</h2>
            <p id="currentSongInfo">第 1 首 / 共 18 首</p>
        </div>
        
        <div class="volume-container">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
        
        <div class="progress-container">
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        
        <div class="controls">
            <button id="prevBtn">⏮</button>
            <button class="play-pause" id="playPauseBtn">▶️</button>
            <button id="nextBtn">⏭</button>
        </div>
        
        <div class="playlist" id="playlist"></div>
    </div>
    
    <audio id="audio"></audio>
    
    <script>
        // 歌曲清單
        // 格式：{ name: '顯示名稱', url: 'Google Drive 直接下載連結' }
        // 
        // 如何取得 Google Drive 直接下載連結：
        // 1. 取得分享連結，例如：https://drive.google.com/file/d/1ABC123xyz/view?usp=sharing
        // 2. 提取「檔案ID」（1ABC123xyz 這部分）
        // 3. 改成這個格式：https://drive.google.com/uc?export=download&id=1ABC123xyz
        //
        const songs = [
            { name: '曲目1', url: 'https://drive.google.com/uc?export=download&id=18idq1ewLgiB1Ex54iRX2KxtWkads4_Yo' },
            { name: '曲目2', url: 'https://drive.google.com/uc?export=download&id=10C_XyjoRd9x5pHNb5qtvtn1_AsVKkbpX' },
            { name: '曲目3', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目4', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目5', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目6', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目7', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目8', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目9', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目10', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目11', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目12', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目13', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目14', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目15', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目16', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目17', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' },
            { name: '曲目18', url: 'https://drive.google.com/uc?export=download&id=在此填入檔案ID' }
        ];
        
        let currentSongIndex = 0;
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTime = document.getElementById('currentTime');
        const duration = document.getElementById('duration');
        const currentSongTitle = document.getElementById('currentSongTitle');
        const currentSongInfo = document.getElementById('currentSongInfo');
        const playlist = document.getElementById('playlist');
        const volumeSlider = document.getElementById('volumeSlider');
        
        // 初始化音量
        audio.volume = 0.7;
        
        // 載入歌曲
        function loadSong(index) {
            currentSongIndex = index;
            audio.src = songs[index].url;
            currentSongTitle.textContent = songs[index].name;
            currentSongInfo.textContent = `第 ${index + 1} 首 / 共 ${songs.length} 首`;
            updatePlaylist();
        }
        
        // 播放/暫停
        function togglePlayPause() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸️';
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶️';
            }
        }
        
        // 上一首
        function prevSong() {
            currentSongIndex--;
            if (currentSongIndex < 0) {
                currentSongIndex = songs.length - 1;
            }
            loadSong(currentSongIndex);
            audio.play();
            playPauseBtn.textContent = '⏸️';
        }
        
        // 下一首
        function nextSong() {
            currentSongIndex++;
            if (currentSongIndex >= songs.length) {
                currentSongIndex = 0;
            }
            loadSong(currentSongIndex);
            audio.play();
            playPauseBtn.textContent = '⏸️';
        }
        
        // 更新進度條
        function updateProgress() {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progress.style.width = progressPercent + '%';
            
            currentTime.textContent = formatTime(audio.currentTime);
            duration.textContent = formatTime(audio.duration);
        }
        
        // 格式化時間
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // 點擊進度條
        function setProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }
        
        // 音量控制
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
        
        // 建立播放清單
        function createPlaylist() {
            songs.forEach((song, index) => {
                const playlistItem = document.createElement('div');
                playlistItem.classList.add('playlist-item');
                playlistItem.innerHTML = `
                    <span class="playlist-item-number">${index + 1}</span>
                    <span>${song.name}</span>
                `;
                playlistItem.addEventListener('click', () => {
                    loadSong(index);
                    audio.play();
                    playPauseBtn.textContent = '⏸️';
                });
                playlist.appendChild(playlistItem);
            });
        }
        
        // 更新播放清單狀態
        function updatePlaylist() {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if (index === currentSongIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // 事件監聽
        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        audio.addEventListener('timeupdate', updateProgress);
        progressBar.addEventListener('click', setProgress);
        audio.addEventListener('ended', nextSong);
        
        // 初始化
        createPlaylist();
        loadSong(0);
        
        // 自動播放（需要用戶互動後才能啟動，所以加入延遲嘗試）
        // 某些瀏覽器需要用戶點擊才能播放，如果自動播放失敗會靜音嘗試
        setTimeout(() => {
            audio.play().then(() => {
                playPauseBtn.textContent = '⏸️';
            }).catch(err => {
                // 如果自動播放被阻擋，嘗試靜音播放
                console.log('自動播放被阻擋，嘗試靜音播放');
                audio.muted = true;
                audio.play().then(() => {
                    playPauseBtn.textContent = '⏸️';
                    // 播放後恢復音量
                    setTimeout(() => {
                        audio.muted = false;
                    }, 1000);
                }).catch(err2 => {
                    console.log('無法自動播放，需要用戶點擊播放按鈕');
                });
            });
        }, 500);
    </script>
</body>
</html>
